<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <defs>
    <linearGradient id="hoursGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="2" y="2" width="276" height="66" rx="12" fill="url(#hoursGrad)" stroke="#E62329" stroke-width="1.5"/>
  
  <!-- Clock Icon -->
  <circle cx="40" cy="35" r="16" fill="none" stroke="#E62329" stroke-width="2"/>
  <path d="M40 24 L40 35 L50 40" fill="none" stroke="#E62329" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="70" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#A3A3A3" text-transform="uppercase" letter-spacing="0.15em">Open</text>
  <text x="70" y="48" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Sat - Thu: 8AM - 8PM</text>
  <text x="210" y="48" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#10B981">OPEN NOW</text>
</svg>