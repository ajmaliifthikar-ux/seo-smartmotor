<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <clipPath id="leftClip">
      <rect x="10" y="10" width="285" height="280" rx="8"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="305" y="10" width="285" height="280" rx="8"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="600" height="300" fill="#FAFAF9"/>
  
  <!-- Left Panel - BEFORE -->
  <rect x="10" y="10" width="285" height="280" rx="8" fill="#1A1A1A"/>
  <rect x="10" y="10" width="285" height="280" rx="8" fill="url(#carbonPattern)" opacity="0.3"/>
  <text x="152" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle" text-transform="uppercase" letter-spacing="0.3em">BEFORE</text>
  
  <!-- Right Panel - AFTER -->
  <rect x="305" y="10" width="285" height="280" rx="8" fill="#E62329"/>
  <text x="447" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle" text-transform="uppercase" letter-spacing="0.3em">AFTER</text>
  
  <!-- Divider -->
  <line x1="300" y1="10" x2="300" y2="290" stroke="#E62329" stroke-width="3"/>
  
  <!-- Center Arrow -->
  <circle cx="300" cy="150" r="25" fill="#121212" stroke="#E62329" stroke-width="2"/>
  <path d="M290 150 L305 140 L305 160 Z" fill="#E62329"/>
  
  <!-- Labels -->
  <text x="152" y="35" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#A3A3A3" text-anchor="middle" text-transform="uppercase" letter-spacing="0.2em">ORIGINAL</text>
  <text x="447" y="35" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" text-transform="uppercase" letter-spacing="0.2em">TRANSFORMED</text>
</svg>