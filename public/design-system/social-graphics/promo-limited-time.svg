<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="stampGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E62329"/>
      <stop offset="100%" style="stop-color:#B31D22"/>
    </linearGradient>
  </defs>
  
  <!-- Stamp Circle -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="url(#stampGrad)" stroke-width="6" stroke-dasharray="8,4"/>
  
  <!-- Inner Circle -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="url(#stampGrad)" stroke-width="2"/>
  
  <!-- Text -->
  <text x="90" y="75" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" text-transform="uppercase" letter-spacing="0.2em">Limited Time</text>
  <text x="90" y="100" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" font-style="italic">OFFER</text>
  
  <!-- Decorative Lines -->
  <line x1="30" y1="115" x2="150" y2="115" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="125" x2="150" y2="125" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
</svg>